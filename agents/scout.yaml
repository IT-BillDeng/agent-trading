# Scout Agent Configuration
# 职责：候选标的/异常波动扫描（扫描候选标的、异常波动检测）
# 频率：按需或定时

agent_id: scout
model: openai-codex/gpt-5.4-mini
description: "候选标的/异常波动扫描：扫描候选标的、异常波动检测"
frequency: "按需或定时"

# Tool 权限配置
tools:
  - read
  - write
  - browser
  - web_search
  - web_fetch
  - sessions_send

# 输入文件
input_files:
  - /workspace/agent-trading/data/watchlist.json
  - /workspace/agent-trading/logs/latest/engine_cycle.json
  - /workspace/agent-trading/logs/latest/market_context.json
  - /workspace/agent-trading/artifacts/newswire/latest.json
  - /workspace/agent-trading/artifacts/strategist/strategy_plan_latest.json

# 输出文件
output_files:
  - /workspace/agent-trading/artifacts/scout/candidates_latest.json
  - /workspace/agent-trading/artifacts/scout/candidates_history.jsonl

write_scopes:
  - /workspace/agent-trading/artifacts/scout/

protected_paths:
  - /workspace/agent-trading/docs/
  - /workspace/agent-trading/cron/
  - /workspace/agent-trading/agents/

# 汇报目标
report_to: ${ENGINE_MAIN_AGENT_SESSION_KEY}
