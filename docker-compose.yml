# ============================================================
# Tiger Trading — Docker 编排
# ============================================================
# 主服务：dashboard（Web 看板 + 内置信号调度器）
# ============================================================

services:
  # ---------- 主服务：Dashboard + 内置调度器 ----------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: tiger-dashboard
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./rules:/app/rules
      - ./news:/app/news
      - ./properties:/app/properties
      - ./runtime/tiger_engine:/app/runtime
    environment:
      - TZ=Asia/Shanghai
      - TIGER_CONFIG_DIR=/app/config
      - TIGER_RULES_DIR=/app/rules
      - TIGER_NEWS_DIR=/app/news
      - TIGER_PROPERTIES_DIR=/app/properties
      - TIGER_WORKSPACE=/app
      - TIGER_WATCHLIST_PATH=/app/data/watchlist.json
      - TIGER_QUOTE_PROVIDER=yfinance
      - TIGER_RUNTIME_DIR=/app/runtime
      - TIGER_APP_CONFIG=/app/config/app_config.docker.json
      # 调度器配置
      - TIGER_SCHEDULER_PROVIDER=yfinance
      - TIGER_SCHEDULER_INTERVAL=60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


