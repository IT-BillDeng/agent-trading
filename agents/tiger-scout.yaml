# Tiger Scout Agent Configuration
# 职责：候选标的/异常波动扫描（扫描候选标的、异常波动检测）
# 频率：按需或定时

agent_id: tiger-scout
model: xiaomi-tp/mimo-v2-omni
description: "候选标的/异常波动扫描：扫描候选标的、异常波动检测"
frequency: "按需或定时"

# Tool 权限配置
tools:
  - read
  - write
  - browser
  - web_search
  - web_fetch
  - sessions_send

# 输入文件
input_files:
  - /workspace/tiger-trading/data/watchlist.json
  - /workspace/tiger-trading/runtime/tiger_engine/.last_execution_cycle.json
  - /workspace/tiger-trading/runtime/tiger_engine/market_context.json

# 输出文件
output_files:
  - /workspace/tiger-trading/runtime/tiger_engine/scout_candidates_latest.json
  - /workspace/tiger-trading/runtime/tiger_engine/scout_candidates_history.jsonl

# 汇报目标
report_to: agent:yuuka:main
