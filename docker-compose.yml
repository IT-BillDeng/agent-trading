# ============================================================
# Tiger Trading — Docker 编排
# ============================================================
# 主服务：dashboard（Web 看板 + 内置信号调度器）
# 辅助服务：tiger-engine（按需执行，用于手动触发完整执行周期）
# ============================================================

services:
  # ---------- 主服务：Dashboard + 内置调度器 ----------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: tiger-dashboard
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./runtime/tiger_engine:/app/runtime
    environment:
      - TZ=Asia/Shanghai
      - TIGER_CONFIG_DIR=/app/config
      - TIGER_WORKSPACE=/app
      - TIGER_WATCHLIST_PATH=/app/data/watchlist.json
      - TIGER_QUOTE_PROVIDER=yfinance
      - TIGER_RUNTIME_DIR=/app/runtime
      - TIGER_APP_CONFIG=/app/config/app_config.docker.json
      # 调度器配置
      - TIGER_SCHEDULER_PROVIDER=yfinance
      - TIGER_SCHEDULER_INTERVAL=60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------- 辅助服务：按需执行完整周期（含下单） ----------
  tiger-engine:
    build:
      context: ./system/tiger_engine
      dockerfile: Dockerfile
    container_name: tiger-engine
    profiles:
      - manual
    volumes:
      - ./config:/app/config:ro
      - ./runtime/tiger_engine:/app/runtime
    environment:
      - TZ=Asia/Shanghai
    restart: "no"
