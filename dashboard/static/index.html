<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Trading Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tiger: { 50: '#fff7ed', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' },
                        dark: { 800: '#1e1e2e', 900: '#11111b', 700: '#2a2a3c' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; }
        .card { @apply bg-dark-700 rounded-xl p-4 border border-gray-700/50; }
        .card-title { @apply text-sm font-medium text-gray-400 mb-2; }
        .positive { color: #22c55e; }
        .negative { color: #ef4444; }
        .neutral { color: #a1a1aa; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="border-b border-gray-700/50 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🐯</span>
            <h1 class="text-lg font-semibold">Tiger Trading Dashboard</h1>
            <span id="env-badge" class="text-xs px-2 py-0.5 rounded bg-yellow-500/20 text-yellow-400 font-medium">PAPER</span>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <span id="refresh-status" class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-green-500 pulse-dot"></span>
                <span class="text-gray-400">更新中</span>
            </span>
            <span id="last-update" class="text-gray-500"></span>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <!-- Account Overview -->
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card">
                <div class="card-title">总资产</div>
                <div id="total-assets" class="text-2xl font-bold">--</div>
            </div>
            <div class="card">
                <div class="card-title">今日盈亏</div>
                <div id="today-pnl" class="text-2xl font-bold">--</div>
            </div>
            <div class="card">
                <div class="card-title">可用资金</div>
                <div id="buying-power" class="text-2xl font-bold">--</div>
            </div>
            <div class="card">
                <div class="card-title">持仓市值</div>
                <div id="position-value" class="text-2xl font-bold">--</div>
            </div>
        </section>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Positions -->
            <div class="lg:col-span-2 card">
                <div class="card-title">📊 持仓</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700/50">
                                <th class="text-left py-2">标的</th>
                                <th class="text-right py-2">数量</th>
                                <th class="text-right py-2">均价</th>
                                <th class="text-right py-2">市值</th>
                                <th class="text-right py-2">浮动盈亏</th>
                            </tr>
                        </thead>
                        <tbody id="positions-body">
                            <tr><td colspan="5" class="py-4 text-center text-gray-500">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Quotes -->
            <div class="card">
                <div class="card-title">📈 自选行情</div>
                <div id="quotes-list" class="space-y-2">
                    <div class="text-gray-500 text-sm">加载中...</div>
                </div>
            </div>
        </div>

        <!-- Second Row -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
            <!-- Orders -->
            <div class="card">
                <div class="card-title">📋 今日订单</div>
                <div id="orders-list" class="space-y-2 max-h-64 overflow-y-auto">
                    <div class="text-gray-500 text-sm">加载中...</div>
                </div>
            </div>

            <!-- P&L -->
            <div class="card">
                <div class="card-title">💰 盈亏明细</div>
                <div id="pnl-details" class="space-y-2 max-h-64 overflow-y-auto">
                    <div class="text-gray-500 text-sm">加载中...</div>
                </div>
            </div>

            <!-- Agents -->
            <div class="card">
                <div class="card-title">🤖 Subagent 状态</div>
                <div id="agents-list" class="space-y-2">
                    <div class="text-gray-500 text-sm">加载中...</div>
                </div>
            </div>
        </div>

        <!-- Watchlist Management -->
        <section class="mt-6 card">
            <div class="card-title">📝 自选管理</div>
            <div class="flex gap-2 mb-3">
                <input id="wl-symbol" type="text" placeholder="代码 (如 AAPL)" class="bg-dark-900 border border-gray-600 rounded px-3 py-1.5 text-sm w-28 focus:outline-none focus:border-tiger-500">
                <select id="wl-market" class="bg-dark-900 border border-gray-600 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-tiger-500">
                    <option value="US">US</option>
                    <option value="HK">HK</option>
                </select>
                <input id="wl-name" type="text" placeholder="名称" class="bg-dark-900 border border-gray-600 rounded px-3 py-1.5 text-sm w-32 focus:outline-none focus:border-tiger-500">
                <input id="wl-lotsize" type="number" placeholder="Lot Size" class="bg-dark-900 border border-gray-600 rounded px-3 py-1.5 text-sm w-24 focus:outline-none focus:border-tiger-500 hidden">
                <button onclick="addWatchlist()" class="bg-tiger-600 hover:bg-tiger-700 text-white px-3 py-1.5 rounded text-sm font-medium transition">+ 添加</button>
            </div>
            <div id="watchlist-mgmt" class="space-y-1 text-sm">
                <div class="text-gray-500">加载中...</div>
            </div>
            <div id="wl-msg" class="text-xs mt-2 hidden"></div>
        </section>

        <!-- System Status -->
        <section class="mt-6 card">
            <div class="flex items-center justify-between">
                <div class="card-title mb-0">⚙️ 系统状态</div>
                <div id="system-info" class="text-xs text-gray-500"></div>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = '';
        const REFRESH_MS = 15000; // 15 seconds

        // --- Helpers ---
        function fmt(n, decimals = 2) {
            if (n === null || n === undefined || isNaN(n)) return '--';
            return Number(n).toFixed(decimals);
        }
        function fmtUSD(n) { return '$' + fmt(n); }
        function pnlClass(n) {
            if (n === null || n === undefined || isNaN(n)) return 'neutral';
            return n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral';
        }
        function pnlSign(n) {
            if (n === null || n === undefined) return '';
            return n > 0 ? '+' : '';
        }
        function ago(isoStr) {
            if (!isoStr) return '--';
            const d = new Date(isoStr);
            const diff = (Date.now() - d.getTime()) / 1000;
            if (diff < 60) return Math.floor(diff) + 's ago';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            return d.toLocaleTimeString('zh-CN');
        }

        // --- Render Functions ---
        function renderAccount(data) {
            document.getElementById('total-assets').textContent = fmtUSD(data.net_liquidation || data.total_equity || data.cash);
            const pnl = data.unrealized_pnl || 0;
            const pnlEl = document.getElementById('today-pnl');
            pnlEl.textContent = pnlSign(pnl) + fmtUSD(pnl);
            pnlEl.className = 'text-2xl font-bold ' + pnlClass(pnl);
            document.getElementById('buying-power').textContent = fmtUSD(data.buying_power || data.available_funds || data.cash);
        }

        function renderPositions(data) {
            const tbody = document.getElementById('positions-body');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-4 text-center text-gray-500">无持仓</td></tr>';
                return;
            }
            let totalValue = 0;
            tbody.innerHTML = data.map(p => {
                const val = p.market_value || 0;
                totalValue += val;
                const pnl = p.unrealized_pnl;
                return `<tr class="border-b border-gray-700/30 hover:bg-dark-800/50">
                    <td class="py-2 font-medium">${p.symbol || '--'}<br><span class="text-xs text-gray-500">${p.name || ''}</span></td>
                    <td class="text-right py-2">${p.quantity || '--'}</td>
                    <td class="text-right py-2">${fmtUSD(p.average_cost)}</td>
                    <td class="text-right py-2">${fmtUSD(val)}</td>
                    <td class="text-right py-2 ${pnlClass(pnl)}">${pnlSign(pnl)}${fmtUSD(pnl)}</td>
                </tr>`;
            }).join('');
            document.getElementById('position-value').textContent = fmtUSD(totalValue);
        }

        function renderQuotes(data) {
            const list = document.getElementById('quotes-list');
            const symbols = Object.keys(data);
            if (symbols.length === 0) {
                list.innerHTML = '<div class="text-gray-500 text-sm">无行情数据</div>';
                return;
            }
            list.innerHTML = symbols.map(sym => {
                const q = data[sym];
                const price = q.latest_price || q.last_price || '--';
                const change = q.change || 0;
                const changeRate = q.change_rate || 0;
                const cls = pnlClass(change);
                return `<div class="flex items-center justify-between py-1.5 border-b border-gray-700/30">
                    <div>
                        <span class="font-medium">${sym}</span>
                        <span class="text-xs text-gray-500 ml-1">${q.name || ''}</span>
                    </div>
                    <div class="text-right">
                        <span class="font-medium">${fmt(price)}</span>
                        <span class="${cls} text-xs ml-2">${pnlSign(change)}${fmt(changeRate * 100)}%</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderOrders(data) {
            const list = document.getElementById('orders-list');
            if (!data || data.length === 0) {
                list.innerHTML = '<div class="text-gray-500 text-sm">今日无订单</div>';
                return;
            }
            list.innerHTML = data.map(o => {
                const actionCls = o.action === 'BUY' ? 'text-green-400' : 'text-red-400';
                return `<div class="py-1.5 border-b border-gray-700/30 flex items-center justify-between">
                    <div>
                        <span class="${actionCls} font-medium">${o.action || '--'}</span>
                        <span class="ml-1">${o.symbol || '--'}</span>
                        <span class="text-gray-500 text-xs ml-1">${o.quantity || ''}股</span>
                    </div>
                    <div class="text-right text-xs">
                        <span class="text-gray-400">${o.order_type || ''}</span>
                        <span class="ml-1 text-gray-500">${o.status || ''}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPnl(data) {
            const el = document.getElementById('pnl-details');
            if (!data || !data.details || data.details.length === 0) {
                el.innerHTML = '<div class="text-gray-500 text-sm">无数据</div>';
                return;
            }
            el.innerHTML = `
                <div class="text-sm mb-2">
                    <span class="text-gray-400">总浮动:</span>
                    <span class="${pnlClass(data.total_unrealized)} font-medium ml-1">${pnlSign(data.total_unrealized)}${fmtUSD(data.total_unrealized)}</span>
                    <span class="text-gray-400 ml-3">总已实现:</span>
                    <span class="${pnlClass(data.total_realized)} font-medium ml-1">${pnlSign(data.total_realized)}${fmtUSD(data.total_realized)}</span>
                </div>
            ` + data.details.map(d => `
                <div class="flex justify-between py-1 border-b border-gray-700/30 text-sm">
                    <span>${d.symbol || '--'}</span>
                    <span class="${pnlClass(d.unrealized_pnl)}">${pnlSign(d.unrealized_pnl)}${fmtUSD(d.unrealized_pnl)}</span>
                </div>
            `).join('');
        }

        function renderAgents(data) {
            const el = document.getElementById('agents-list');
            const agentNames = {
                watcher: '👁️ Watcher', strategist: '🧠 Strategist', executor: '⚡ Executor',
                newswire: '📰 Newswire', scout: '🔍 Scout', closer: '🔚 Closer'
            };
            el.innerHTML = Object.entries(data).map(([name, info]) => {
                const statusCls = info.last_update ? 'text-green-400' : 'text-gray-500';
                return `<div class="flex items-center justify-between py-1.5 border-b border-gray-700/30 text-sm">
                    <span>${agentNames[name] || name}</span>
                    <span class="${statusCls} text-xs">${info.last_update ? ago(info.last_update) : '待启动'}</span>
                </div>`;
            }).join('');
        }

        function renderSystem(data) {
            document.getElementById('system-info').textContent =
                `账户: ${data.account_id || '--'} | 刷新: ${data.refresh_count || 0}次 | 间隔: ${data.refresh_interval || '--'}s`;
            const updateTime = data.last_updated ? ago(data.last_updated) : '--';
            document.getElementById('last-update').textContent = '上次更新: ' + updateTime;
        }

        // --- Watchlist Management ---
        function showWlMsg(msg, isError) {
            const el = document.getElementById('wl-msg');
            el.textContent = msg;
            el.className = 'text-xs mt-2 ' + (isError ? 'text-red-400' : 'text-green-400');
            setTimeout(() => el.className = 'text-xs mt-2 hidden', 3000);
        }

        // Toggle lot size field based on market
        document.getElementById('wl-market')?.addEventListener('change', function() {
            document.getElementById('wl-lotsize').classList.toggle('hidden', this.value !== 'HK');
        });

        async function fetchWatchlist() {
            try {
                const data = await fetch(API_BASE + '/api/watchlist').then(r => r.json());
                renderWatchlistMgmt(data);
            } catch (e) {
                console.error('watchlist fetch error:', e);
            }
        }

        function renderWatchlistMgmt(data) {
            const el = document.getElementById('watchlist-mgmt');
            const symbols = data.symbols || [];
            if (symbols.length === 0) {
                el.innerHTML = '<div class="text-gray-500">暂无自选</div>';
                return;
            }
            el.innerHTML = symbols.map(s => {
                const prioBadge = s.priority === 'high'
                    ? '<span class="text-xs px-1.5 py-0.5 rounded bg-yellow-500/20 text-yellow-400">高</span>'
                    : '';
                const enabledCls = s.enabled ? '' : 'opacity-40';
                const nextPrio = s.priority === 'high' ? 'normal' : 'high';
                return '<div class="flex items-center justify-between py-1.5 border-b border-gray-700/30 ' + enabledCls + '">' +
                    '<div class="flex items-center gap-2">' +
                        '<span class="font-medium">' + s.symbol + '</span>' +
                        '<span class="text-xs text-gray-500">' + (s.name || '') + '</span>' +
                        '<span class="text-xs text-gray-600">' + s.market + '</span>' +
                        prioBadge +
                        (s.lot_size ? '<span class="text-xs text-gray-600">lot=' + s.lot_size + '</span>' : '') +
                    '</div>' +
                    '<div class="flex items-center gap-1">' +
                        '<button onclick="toggleEnabled(\'' + s.symbol + '\', ' + !s.enabled + ')" class="text-xs px-2 py-0.5 rounded border border-gray-600 hover:border-gray-400 transition" title="' + (s.enabled ? '禁用' : '启用') + '">' +
                            (s.enabled ? '👁️' : '🚫') +
                        '</button>' +
                        '<button onclick="togglePriority(\'' + s.symbol + '\', \'' + nextPrio + '\')" class="text-xs px-2 py-0.5 rounded border border-gray-600 hover:border-gray-400 transition" title="切换优先级">' +
                            (s.priority === 'high' ? '⭐' : '☆') +
                        '</button>' +
                        '<button onclick="removeSymbol(\'' + s.symbol + '\')" class="text-xs px-2 py-0.5 rounded border border-gray-600 hover:border-red-400 hover:text-red-400 transition" title="删除">' +
                            '✕' +
                        '</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        async function addWatchlist() {
            const symbol = document.getElementById('wl-symbol').value.trim();
            const market = document.getElementById('wl-market').value;
            const name = document.getElementById('wl-name').value.trim();
            const lotSize = document.getElementById('wl-lotsize').value;

            if (!symbol) { showWlMsg('请输入代码', true); return; }

            const body = { symbol, market, name };
            if (market === 'HK' && lotSize) body.lot_size = parseInt(lotSize);

            try {
                const res = await fetch(API_BASE + '/api/watchlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (data.error) { showWlMsg(data.error, true); return; }
                showWlMsg('\u5df2\u6dfb\u52a0 ' + symbol, false);
                document.getElementById('wl-symbol').value = '';
                document.getElementById('wl-name').value = '';
                document.getElementById('wl-lotsize').value = '';
                fetchWatchlist();
            } catch (e) { showWlMsg('添加失败', true); }
        }

        async function toggleEnabled(symbol, enabled) {
            try {
                await fetch(API_BASE + '/api/watchlist/' + symbol, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled }),
                });
                fetchWatchlist();
            } catch (e) { showWlMsg('操作失败', true); }
        }

        async function togglePriority(symbol, priority) {
            try {
                await fetch(API_BASE + '/api/watchlist/' + symbol, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ priority }),
                });
                fetchWatchlist();
            } catch (e) { showWlMsg('操作失败', true); }
        }

        async function removeSymbol(symbol) {
            if (!confirm('\u78ba\u8ba4\u5220\u9664 ' + symbol + ' ?')) return;
            try {
                await fetch(API_BASE + '/api/watchlist/' + symbol, { method: 'DELETE' });
                showWlMsg('\u5df2\u5220\u9664 ' + symbol, false);
                fetchWatchlist();
            } catch (e) { showWlMsg('删除失败', true); }
        }

        // --- Fetch & Render ---
        async function fetchAll() {
            try {
                const [account, positions, quotes, orders, pnl, agents, system] = await Promise.all([
                    fetch(API_BASE + '/api/account').then(r => r.json()),
                    fetch(API_BASE + '/api/positions').then(r => r.json()),
                    fetch(API_BASE + '/api/quotes').then(r => r.json()),
                    fetch(API_BASE + '/api/orders').then(r => r.json()),
                    fetch(API_BASE + '/api/pnl').then(r => r.json()),
                    fetch(API_BASE + '/api/agents').then(r => r.json()),
                    fetch(API_BASE + '/api/system').then(r => r.json()),
                ]);

                renderAccount(account);
                renderPositions(positions);
                renderQuotes(quotes);
                renderOrders(orders);
                renderPnl(pnl);
                renderAgents(agents);
                renderSystem(system);
                fetchWatchlist();
            } catch (e) {
                console.error('Fetch error:', e);
                document.getElementById('refresh-status').innerHTML =
                    '<span class="w-2 h-2 rounded-full bg-red-500"></span><span class="text-red-400">连接失败</span>';
            }
        }

        // --- Init ---
        fetchAll();
        setInterval(fetchAll, REFRESH_MS);
    </script>
</body>
</html>
