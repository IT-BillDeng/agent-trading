# Factor Validator Agent Configuration
# 职责：冷路径只读验证 / proposal draft 证据核验 / shadow-only 安全检查
# 频率：按需或 US 盘后
# 定位：不是主 agent，不是交易员，不是发布员，不是 apply 执行器

agent_id: factor_validator
model: openai-codex/gpt-5.4-mini
description: "冷路径因子验证员：只读核验候选因子与绑定草案，不 apply、不交易"
frequency: "按需或 US 盘后"
capability_level: cold_validation_v1

tools:
  - read
  - sessions_send

input_files:
  - /workspace/agent-trading/docs/factor-research-playbook.md
  - /workspace/agent-trading/docs/factor-system-contract.md
  - /workspace/agent-trading/docs/factor-researcher-role-contract.md
  - /workspace/agent-trading/specs/factor-registry-schema-v1.md
  - /workspace/agent-trading/factors/registry.json
  - /workspace/agent-trading/artifacts/factors/latest.json
  - /workspace/agent-trading/artifacts/factors/
  - /workspace/agent-trading/artifacts/factor_research/
  - /workspace/agent-trading/artifacts/strategist/approval_queue/
  - /workspace/agent-trading/artifacts/strategist/strategy_plan_history.jsonl
  - /workspace/agent-trading/artifacts/newswire/latest.json
  - /workspace/agent-trading/artifacts/watcher/latest.json
  - /workspace/agent-trading/logs/latest/engine_cycle.json
  - /workspace/agent-trading/logs/latest/market_context.json

output_files:

write_scopes:

protected_paths:
  - /workspace/agent-trading/.env
  - /workspace/agent-trading/properties/
  - /workspace/agent-trading/runtime/
  - /workspace/agent-trading/logs/latest/
  - /workspace/agent-trading/artifacts/broker/
  - /workspace/agent-trading/artifacts/strategist/approval_queue/
  - /workspace/agent-trading/rules/
  - /workspace/agent-trading/factors/
  - /workspace/agent-trading/system/engine/src/engine/execution.py
  - /workspace/agent-trading/system/engine/src/engine/live_execution.py
  - /workspace/agent-trading/system/engine/src/engine/risk.py
  - /workspace/agent-trading/system/engine/src/engine/applier.py
  - /workspace/agent-trading/system/engine/src/engine/adapters/broker/
  - /workspace/agent-trading/system/engine/src/engine/broker_client.py
  - /workspace/agent-trading/system/engine/src/engine/tiger_client.py
  - /workspace/agent-trading/dashboard/api/control.py
  - /workspace/agent-trading/dashboard/api/strategy.py
  - /workspace/agent-trading/dashboard/scheduler.py
  - /workspace/agent-trading/docker-compose.yml
  - /workspace/agent-trading/cron/
  - /workspace/agent-trading/agents/

report_to: ${ENGINE_MAIN_AGENT_SESSION_KEY}
