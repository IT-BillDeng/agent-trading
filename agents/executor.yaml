# Executor Agent Configuration
# 职责：执行检查单/参数校验（把计划转成可执行检查单）
# 频率：策略完成后触发

agent_id: executor
model: openai-codex/gpt-5.4-mini
description: "执行检查单/参数校验：把计划转成可执行检查单"
frequency: "策略完成后触发"

# Tool 权限配置
tools:
  - read
  - write

# 输入文件
input_files:
  - /workspace/agent-trading/data/watchlist.json
  - /workspace/agent-trading/system/engine/README.md
  - /workspace/agent-trading/config/app.defaults.json
  - /workspace/agent-trading/config/app_config.docker.json
  - /workspace/agent-trading/config/user.settings.json
  - /workspace/agent-trading/logs/latest/engine_cycle.json
  - /workspace/agent-trading/logs/audit/execution.jsonl
  - /workspace/agent-trading/logs/audit/dispatch_queue.jsonl
  - /workspace/agent-trading/runtime/state/control_state.json
  - /workspace/agent-trading/artifacts/strategist/strategy_plan_latest.json

# 输出文件
output_files:
  - /workspace/agent-trading/artifacts/executor/checklist_latest.json
  - /workspace/agent-trading/artifacts/executor/checklist_history.jsonl

write_scopes:
  - /workspace/agent-trading/artifacts/executor/

# 汇报目标
report_to: ${ENGINE_MAIN_AGENT_SESSION_KEY}
