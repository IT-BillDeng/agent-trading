# Applier Agent Configuration
# 职责：应用已批准的策略更新（热更新 / 冷更新分流）
# 频率：按需触发（非 cron）

agent_id: applier
model: openai-codex/gpt-5.4-mini
description: "变更应用器：应用已批准的策略更新并记录部署结果"
frequency: "按需触发"

# Tool 权限配置
tools:
  - read
  - write
  - exec
  - sessions_send

# 输入文件
input_files:
  - /workspace/agent-trading/artifacts/strategist/approval_queue/
  - /workspace/agent-trading/artifacts/strategist/approval_decisions.jsonl
  - /workspace/agent-trading/artifacts/strategist/deployment_records.jsonl
  - /workspace/agent-trading/artifacts/strategist/code_change_results.jsonl
  - /workspace/agent-trading/runtime/state/control_state.json
  - /workspace/agent-trading/config/app.defaults.json
  - /workspace/agent-trading/config/app_config.docker.json
  - /workspace/agent-trading/config/user.settings.json

# 输出文件
output_files:
  - /workspace/agent-trading/artifacts/strategist/deployment_records.jsonl
  - /workspace/agent-trading/artifacts/strategist/rollback_notes.jsonl

write_scopes:
  - /workspace/agent-trading/rules/
  - /workspace/agent-trading/system/engine/src/engine/strategy.py
  - /workspace/agent-trading/system/engine/src/engine/rule_engine.py
  - /workspace/agent-trading/system/engine/src/engine/indicators.py
  - /workspace/agent-trading/artifacts/strategist/

protected_paths:
  - /workspace/agent-trading/system/engine/src/engine/live_execution.py
  - /workspace/agent-trading/system/engine/src/engine/broker_client.py
  - /workspace/agent-trading/system/engine/src/engine/tiger_client.py
  - /workspace/agent-trading/system/engine/src/engine/notifier.py
  - /workspace/agent-trading/dashboard/
  - /workspace/agent-trading/docker-compose.yml

# 执行命令（受控 apply）
exec_commands:
  - "python3 /workspace/agent-trading/system/engine/run_dry_run_cycle.py"

# 汇报目标
report_to: ${ENGINE_MAIN_AGENT_SESSION_KEY}
