<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Trading Strategy Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tiger: { 50: '#fff7ed', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' },
                        dark: { 800: '#1e1e2e', 900: '#11111b', 950: '#0b0b12' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; }
        .card {
            background-color: #2a2a3c;
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid rgba(107, 114, 128, 0.5);
        }
        .card-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        .badge { display: inline-flex; align-items: center; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; line-height: 1rem; border: 1px solid transparent; white-space: nowrap; }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">
    <header class="sticky top-0 z-40 border-b border-gray-700/50 px-6 py-3 flex items-center justify-between" style="background-color: #11111b;">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🧠</span>
            <h1 class="text-lg font-semibold">Agent Trading Strategy Hub</h1>
            <nav class="ml-4 flex items-center gap-2 text-xs">
                <a href="/" class="px-2 py-1 rounded bg-gray-800/60 text-gray-400 hover:text-gray-200 border border-gray-700/60">总览</a>
                <a href="/strategy" class="px-2 py-1 rounded bg-gray-700/60 text-gray-200 border border-gray-600/60">策略</a>
                <a href="/logs" class="px-2 py-1 rounded bg-gray-800/60 text-gray-400 hover:text-gray-200 border border-gray-700/60">日志</a>
            </nav>
        </div>
        <div class="flex items-center gap-2 text-xs">
            <button onclick="refreshAll()" class="px-3 py-1.5 rounded bg-sakura-600 hover:bg-sakura-700 text-white border border-sakura-700/60">刷新</button>
            <label class="flex items-center gap-1 text-gray-400">
                <input type="checkbox" id="auto-refresh" class="accent-sakura-500" onchange="toggleAutoRefresh()" checked>
                自动
            </label>
            <span id="page-status" class="text-gray-500">--</span>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="card">
                <div class="card-title">启用策略</div>
                <div id="stat-enabled" class="text-2xl font-bold">--</div>
            </div>
            <div class="card">
                <div class="card-title">停用策略</div>
                <div id="stat-disabled" class="text-2xl font-bold">--</div>
            </div>
            <div class="card">
                <div class="card-title">最新信号</div>
                <div id="stat-signals" class="text-2xl font-bold">--</div>
            </div>
            <div class="card">
                <div class="card-title">调整记录</div>
                <div id="stat-adjustments" class="text-2xl font-bold">--</div>
            </div>
        </section>

        <section class="card">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
                <div>
                    <div class="card-title mb-0">🧭 策略开关</div>
                    <div id="strategy-meta" class="text-xs text-gray-500 mt-1">--</div>
                </div>
                <div class="flex flex-wrap gap-1">
                    <button onclick="setRuleFilter('all')" class="rule-filter-btn px-2 py-1 rounded text-xs border border-gray-600" data-value="all">全部</button>
                    <button onclick="setRuleFilter('enabled')" class="rule-filter-btn px-2 py-1 rounded text-xs border border-gray-600" data-value="enabled">仅启用</button>
                    <button onclick="setRuleFilter('disabled')" class="rule-filter-btn px-2 py-1 rounded text-xs border border-gray-600" data-value="disabled">仅停用</button>
                </div>
            </div>
            <div class="overflow-auto">
                <table class="w-full min-w-max text-sm">
                    <thead class="sticky top-0 z-10" style="background:#2a2a3c">
                        <tr class="text-gray-500 border-b border-gray-700/50">
                            <th class="px-3 py-2 text-left">策略</th>
                            <th class="px-3 py-2 text-center">状态</th>
                            <th class="px-3 py-2 text-right">优先级</th>
                            <th class="px-3 py-2 text-center">周期</th>
                            <th class="px-3 py-2 text-left">市场 / 标的</th>
                            <th class="px-3 py-2 text-right">信号摘要</th>
                        </tr>
                    </thead>
                    <tbody id="rules-table-body">
                        <tr><td colspan="6" class="py-4 text-center text-gray-500">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <div class="flex items-center justify-between gap-3 mb-3">
                <div>
                    <div class="card-title mb-0">📝 最新策略调整</div>
                    <div id="latest-strategy-meta" class="text-xs text-gray-500 mt-1">--</div>
                </div>
                <div id="latest-strategy-badge" class="text-xs text-gray-500">--</div>
            </div>
            <div id="latest-strategy-adjustment" class="space-y-3">
                <div class="text-gray-500 text-sm">加载中...</div>
            </div>
        </section>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="card flex flex-col h-[34rem] min-h-0">
                <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
                    <div>
                        <div class="card-title mb-0">📍 信号轨迹</div>
                        <div id="signals-meta" class="text-xs text-gray-500 mt-1">--</div>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <input id="signal-search" type="text" placeholder="搜索股票 / 策略 / 理由..." class="bg-dark-900 border border-gray-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-sakura-500" oninput="renderSignals(currentStrategyData)">
                        <select id="signal-action-filter" class="bg-dark-900 border border-gray-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-sakura-500" onchange="renderSignals(currentStrategyData)">
                            <option value="all">全部动作</option>
                            <option value="BUY">BUY</option>
                            <option value="EXIT">EXIT</option>
                            <option value="HOLD">HOLD</option>
                        </select>
                    </div>
                </div>
                <div class="flex-1 min-h-0 overflow-auto">
                    <table class="w-full min-w-max text-sm">
                        <thead class="sticky top-0 z-10" style="background:#2a2a3c">
                            <tr class="text-gray-500 border-b border-gray-700/50">
                                <th class="px-3 py-2 text-left">代码/名称</th>
                                <th class="px-3 py-2 text-left">策略</th>
                                <th class="px-3 py-2 text-center">动作</th>
                                <th class="px-3 py-2 text-right">评分</th>
                                <th class="px-3 py-2 text-left">理由</th>
                                <th class="px-3 py-2 text-right">收盘价</th>
                                <th class="px-3 py-2 text-center">状态</th>
                            </tr>
                        </thead>
                        <tbody id="signals-table-body">
                            <tr><td colspan="7" class="py-4 text-center text-gray-500">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card flex flex-col h-[34rem] min-h-0">
                <div class="card-title mb-2">🕒 Strategist 调整时间线</div>
                <div id="strategist-timeline" class="flex-1 min-h-0 overflow-auto space-y-3">
                    <div class="text-gray-500 text-sm">加载中...</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = '';
        let autoRefreshTimer = null;
        let currentStrategyData = null;
        let ruleFilter = 'all';

        function escapeHtml(s) {
            return String(s ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function fmtDateTime(value) {
            if (!value) return '--';
            try {
                return new Date(value).toLocaleString('zh-CN');
            } catch (_) {
                return String(value);
            }
        }

        function fmtUSD(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return '--';
            return '$' + n.toFixed(2);
        }

        function fmtNumber(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return '--';
            return n.toLocaleString('zh-CN');
        }

        function ruleFilterClass(active) {
            return 'transition ' + (active
                ? 'bg-sakura-600/30 text-sakura-400 border-sakura-600/50'
                : 'text-gray-400 border-gray-600 hover:text-gray-200');
        }

        function setRuleFilter(value) {
            ruleFilter = value;
            renderRules(currentStrategyData);
        }

        function actionBadge(action) {
            const a = String(action || 'HOLD').toUpperCase();
            const cls = a === 'BUY'
                ? 'bg-green-500/15 text-green-400 border-green-500/30'
                : a === 'EXIT'
                    ? 'bg-red-500/15 text-red-400 border-red-500/30'
                    : 'bg-gray-700/60 text-gray-300 border-gray-600/40';
            return `<span class="badge ${cls}">${escapeHtml(a)}</span>`;
        }

        function statusBadge(enabled) {
            return enabled
                ? '<span class="badge bg-green-500/15 text-green-400 border-green-500/30">启用</span>'
                : '<span class="badge bg-gray-700/60 text-gray-300 border-gray-600/40">停用</span>';
        }

        function renderSummary(data) {
            const rules = data.rules_summary || [];
            const enabled = rules.filter(r => r.enabled).length;
            const disabled = rules.length - enabled;
            const cycle = data.latest_cycle || {};
            const adjustments = (data.plan_history || []).length + (data.iterations || []).length;

            document.getElementById('stat-enabled').textContent = enabled;
            document.getElementById('stat-disabled').textContent = disabled;
            document.getElementById('stat-signals').textContent = fmtNumber(cycle.signal_count || 0);
            document.getElementById('stat-adjustments').textContent = fmtNumber(adjustments);

            const meta = [];
            if (data.control) meta.push(`模式: ${data.control.trading_mode || '--'}${data.control.locked ? ' / 已锁定' : ''}`);
            if (cycle.cycle_id) meta.push(`cycle: ${cycle.cycle_id}`);
            if (data.config) meta.push(`timeframe: ${data.config.timeframe || '--'}`);
            document.getElementById('strategy-meta').textContent = meta.join(' | ') || '--';
        }

        function renderRules(data) {
            const tbody = document.getElementById('rules-table-body');
            const rules = (data && data.rules_summary) || [];
            const filtered = rules.filter(r => {
                if (ruleFilter === 'enabled' && !r.enabled) return false;
                if (ruleFilter === 'disabled' && r.enabled) return false;
                return true;
            });
            document.querySelectorAll('.rule-filter-btn').forEach(btn => {
                btn.className = `rule-filter-btn px-2 py-1 rounded text-xs border ${ruleFilterClass(btn.dataset.value === ruleFilter)}`;
            });
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="py-4 text-center text-gray-500">暂无符合筛选条件的策略</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(rule => {
                const counts = rule.signal_counts || {};
                const markets = Array.isArray(rule.markets) ? rule.markets.join(', ') : '--';
                const symbols = Array.isArray(rule.symbols) ? rule.symbols.join(', ') : '--';
                return `
                    <tr class="border-b border-gray-700/30 hover:bg-dark-800/40">
                        <td class="px-3 py-2">
                            <div class="font-medium text-gray-100">${escapeHtml(rule.name || '--')}</div>
                            <div class="text-xs text-gray-500 mono">${escapeHtml(rule.rule_id || '--')}</div>
                            <div class="text-xs text-gray-500 mt-1">${escapeHtml(rule.description || '')}</div>
                        </td>
                        <td class="px-3 py-2 text-center">${statusBadge(rule.enabled)}</td>
                        <td class="px-3 py-2 text-right text-gray-200">${rule.priority ?? '--'}</td>
                        <td class="px-3 py-2 text-center text-gray-200">${escapeHtml(rule.timeframe || '--')}</td>
                        <td class="px-3 py-2 text-gray-200">
                            <div>${escapeHtml(markets)}</div>
                            <div class="text-xs text-gray-500 mt-1">${escapeHtml(symbols)}</div>
                        </td>
                        <td class="px-3 py-2 text-right text-gray-200 whitespace-nowrap">
                            <span class="text-green-400">${counts.BUY || 0}</span> /
                            <span class="text-red-400">${counts.EXIT || 0}</span> /
                            <span class="text-gray-400">${counts.HOLD || 0}</span>
                            <div class="text-xs text-gray-500 mt-1">总 ${counts.total || 0}</div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderSignals(data) {
            const tbody = document.getElementById('signals-table-body');
            const records = (data && data.signal_records) || [];
            const actionFilter = (document.getElementById('signal-action-filter')?.value || 'all').toUpperCase();
            const query = (document.getElementById('signal-search')?.value || '').trim().toLowerCase();
            const filtered = records.filter(item => {
                if (actionFilter !== 'ALL' && item.action !== actionFilter) return false;
                if (query && !`${item.symbol} ${item.symbol_name || ''} ${item.rule_name || ''} ${item.reason || ''}`.toLowerCase().includes(query)) return false;
                return true;
            });
            const meta = document.getElementById('signals-meta');
            const cycle = data?.latest_cycle || {};
            meta.textContent = cycle.cycle_id
                ? `cycle: ${cycle.cycle_id} | ${filtered.length}/${records.length} 条可见`
                : `${filtered.length}/${records.length} 条可见`;
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="py-4 text-center text-gray-500">暂无符合筛选条件的信号</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(item => {
                const enabledCls = item.rule_enabled ? '' : 'opacity-50';
                const reason = item.reason || '--';
                const score = item.score != null ? item.score : '--';
                return `
                    <tr class="border-b border-gray-700/30 hover:bg-dark-800/40 ${enabledCls}">
                        <td class="px-3 py-2">
                            <div class="font-medium text-gray-100">${escapeHtml(item.symbol || '--')}</div>
                            <div class="text-xs text-gray-500 mt-1">${escapeHtml(item.symbol_name || '')}</div>
                        </td>
                        <td class="px-3 py-2">
                            <div class="font-medium text-gray-100">${escapeHtml(item.rule_name || '--')}</div>
                            <div class="text-xs text-gray-500 mono mt-1">${escapeHtml(item.rule_id || '--')}</div>
                        </td>
                        <td class="px-3 py-2 text-center">${actionBadge(item.action)}</td>
                        <td class="px-3 py-2 text-right text-gray-200">${score}</td>
                        <td class="px-3 py-2 text-gray-200">${escapeHtml(reason)}</td>
                        <td class="px-3 py-2 text-right text-gray-200 whitespace-nowrap">${fmtUSD(item.last_close)}</td>
                        <td class="px-3 py-2 text-center">${statusBadge(item.rule_enabled)}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderStrategist(data) {
            const latest = data?.latest_plan || (data?.plan_history || [])[0] || {};
            const history = data?.plan_history || [];
            const iterations = data?.iterations || [];
            const latestBox = document.getElementById('latest-strategy-adjustment');
            const latestMeta = document.getElementById('latest-strategy-meta');
            const latestBadge = document.getElementById('latest-strategy-badge');
            const timelineBox = document.getElementById('strategist-timeline');

            const recommendations = Array.isArray(latest.strategy_recommendations) ? latest.strategy_recommendations : [];
            const actionItems = Array.isArray(latest.action_items) ? latest.action_items : [];
            const latestTitle = latest.plan_id || latest.shift || latest.type || '最新策略调整';
            const timelineEntries = [
                ...history.map(item => ({
                    kind: 'plan',
                    title: item.plan_id || item.shift || '策略计划',
                    subtitle: item.shift || item.data_quality || 'plan',
                    time: item.generated_at,
                    summary: item.summary || '暂无摘要',
                    detail: JSON.stringify(item.raw, null, 2),
                })),
                ...iterations.map(item => {
                    const best = item.best || {};
                    const bestLabel = best ? `${best.label || '--'} · ${best.return_pct != null ? Number(best.return_pct).toFixed(2) + '%' : '--'}` : '--';
                    return {
                        kind: 'iter',
                        title: item.iteration_id || '参数迭代',
                        subtitle: item.period || 'iteration',
                        time: item.timestamp,
                        summary: `best: ${bestLabel} | results: ${item.result_count || 0}`,
                        detail: [
                            `symbols: ${(item.symbols || []).join(', ') || '--'}`,
                            `path: ${item.source_path || '--'}`,
                        ].join('\n'),
                    };
                }),
            ].sort((a, b) => {
                const at = a.time ? new Date(a.time).getTime() : 0;
                const bt = b.time ? new Date(b.time).getTime() : 0;
                return bt - at;
            }).slice(0, 10);

            latestMeta.textContent = [latest.generated_at ? fmtDateTime(latest.generated_at) : null, latest.shift || latest.type || null].filter(Boolean).join(' | ') || '--';
            latestBadge.innerHTML = `<span class="badge ${history.length > 0 ? 'bg-sakura-500/15 text-sakura-300 border-sakura-500/30' : 'bg-gray-700/60 text-gray-300 border-gray-600/40'}">${history.length > 0 ? '有历史记录' : '无历史记录'}</span>`;

            latestBox.innerHTML = `
                <div class="space-y-4">
                    <div class="rounded border border-gray-700/60 bg-dark-900 p-4">
                        <div class="flex flex-wrap items-start justify-between gap-3">
                            <div>
                                <div class="text-sm font-medium text-gray-100">最新策略调整</div>
                                <div class="text-xs text-gray-500 mono mt-1">${escapeHtml(latest.plan_id || '--')}</div>
                            </div>
                            <div class="text-xs text-gray-500">
                                <div>${fmtDateTime(latest.generated_at)}</div>
                                <div class="mt-1">${escapeHtml(latest.shift || latest.type || '')}</div>
                            </div>
                        </div>
                        <div class="text-sm text-gray-200 mt-3">${escapeHtml(latest.summary || '暂无摘要')}</div>
                        <div class="text-xs text-gray-500 mt-2">记录: ${escapeHtml(latestTitle)}</div>
                        <div class="mt-3 grid grid-cols-1 gap-2">
                            ${(recommendations.slice(0, 3).map(item => `
                                <div class="rounded bg-gray-800/50 border border-gray-700/50 px-3 py-2">
                                    <div class="flex items-center justify-between gap-2">
                                        <div class="text-xs font-medium text-gray-300">${escapeHtml(item.action || '--')}</div>
                                        <div class="text-xs text-gray-500">${escapeHtml(String(item.priority ?? ''))}</div>
                                    </div>
                                    <div class="text-xs text-gray-400 mt-1">${escapeHtml(item.detail || '')}</div>
                                </div>
                            `).join('') || '<div class="text-xs text-gray-500">本轮是摘要型记录，暂无结构化推荐项</div>')}
                        </div>
                        ${actionItems.length > 0 ? `
                            <details class="mt-3 text-xs text-gray-500">
                                <summary class="cursor-pointer hover:text-gray-300">查看行动项</summary>
                                <div class="mt-2 space-y-1">
                                    ${actionItems.map(item => `<div class="rounded bg-gray-800/40 px-3 py-2 text-gray-300">${escapeHtml(item.owner || '--')} · ${escapeHtml(item.task || '--')}</div>`).join('')}
                                </div>
                            </details>
                        ` : ''}
                    </div>
                </div>
            `;

            timelineBox.innerHTML = `
                <div class="relative pl-6 max-h-[28rem] overflow-auto">
                    <div class="absolute left-2 top-0 bottom-0 w-px bg-gray-700/70"></div>
                    <div class="space-y-4">
                        ${(timelineEntries.map((item) => `
                            <details class="relative pl-5">
                                <div class="absolute left-[-0.25rem] top-2 h-2.5 w-2.5 rounded-full ${item.kind === 'plan' ? 'bg-sakura-500' : 'bg-cyan-400'} border border-gray-900"></div>
                                <summary class="cursor-pointer list-none rounded border border-gray-700/50 bg-gray-800/35 px-3 py-2 hover:bg-gray-800/55">
                                    <div class="flex flex-wrap items-center justify-between gap-2">
                                        <div class="flex items-center gap-2">
                                            <span class="badge ${item.kind === 'plan' ? 'bg-sakura-500/15 text-sakura-300 border-sakura-500/30' : 'bg-cyan-500/15 text-cyan-300 border-cyan-500/30'}">${item.kind === 'plan' ? '计划' : '迭代'}</span>
                                            <span class="text-xs font-medium text-gray-200">${escapeHtml(item.title)}</span>
                                        </div>
                                        <div class="text-xs text-gray-500">${fmtDateTime(item.time)}</div>
                                    </div>
                                    <div class="text-xs text-gray-500 mt-1">${escapeHtml(item.subtitle || '')}</div>
                                    <div class="text-xs text-gray-400 mt-1">${escapeHtml(item.summary || '')}</div>
                                </summary>
                                <pre class="mt-2 ml-1 text-[11px] text-gray-400 whitespace-pre-wrap break-all">${escapeHtml(item.detail || '')}</pre>
                            </details>
                        `).join('') || '<div class="text-gray-500 text-sm">暂无调整记录</div>')}
                    </div>
                </div>
            `;
        }

        async function refreshAll() {
            document.getElementById('page-status').textContent = '刷新中...';
            try {
                const data = await fetch(API_BASE + '/api/strategy-overview').then(r => r.json());
                if (data.error) throw new Error(data.error);
                currentStrategyData = data;
                renderSummary(data);
                renderRules(data);
                renderSignals(data);
                renderStrategist(data);
                document.getElementById('page-status').textContent = '已刷新 ' + new Date().toLocaleTimeString('zh-CN');
            } catch (e) {
                console.error(e);
                document.getElementById('page-status').textContent = '刷新失败';
            }
        }

        function toggleAutoRefresh() {
            if (autoRefreshTimer) clearInterval(autoRefreshTimer);
            if (document.getElementById('auto-refresh').checked) {
                autoRefreshTimer = setInterval(refreshAll, 20000);
            }
        }

        refreshAll();
        toggleAutoRefresh();
