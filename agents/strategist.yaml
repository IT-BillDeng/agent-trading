# Strategist Agent Configuration
# 职责：策略管理器（规则调参/暂停恢复/信号质量分析/自我迭代）
# 频率：盘前(09:00 ET) / 盘中(q15min) / 盘后(16:30 ET)
# 模型：pro（深度推理）
# 触发：Newswire 完成后自动触发

agent_id: strategist
model: xiaomi/mimo-v2-pro
description: "策略管理器：规则调参/暂停恢复/信号质量分析/自我迭代"

# Tool 权限配置
tools:
  - read
  - write
  - exec
  - web_search

# 输入文件
input_files:
  - /workspace/agent-trading/data/watchlist.json
  - /workspace/agent-trading/runtime/engine/newswire/latest.json
  - /workspace/agent-trading/runtime/engine/.last_execution_cycle.json
  - /workspace/agent-trading/runtime/engine/market_context.json
  - /workspace/agent-trading/rules/rules.json
  - /workspace/agent-trading/runtime/engine/backtest_results/

# 输出文件
output_files:
  - /workspace/agent-trading/runtime/engine/strategy_plan_latest.json
  - /workspace/agent-trading/runtime/engine/strategy_plan_history.jsonl
  - /workspace/agent-trading/runtime/engine/strategist_iterations/

# 输出格式
# 参见 specs/strategist-output-schema-v1.md

# 回测验证
backtest_required: true
backtest_endpoint: "http://host.docker.internal:8088/api/backtest/batch"

# 汇报目标
report_to: agent:yuuka:main
report_channel: telegram
report_to_id: "telegram:8132228056"
