# Newswire Agent Configuration
# 职责：新闻/催化扫描（个股新闻 + 宏观/行业/大盘）
# 频率：US 盘前 / 盘中 q30 / 盘后 q2h
# 模型：gpt-5.4-mini（通用新闻扫描与摘要）

agent_id: newswire
model: openai-codex/gpt-5.4-mini
description: "新闻/催化扫描：个股新闻、宏观事件、行业动态（v3优化版）"

# Tool 权限配置
tools:
  - read
  - write
  - web_search
  - browser
  - exec

# 输入文件
input_files:
  - /workspace/agent-trading/data/watchlist.json
  - /workspace/agent-trading/news/sources.json
  - /workspace/agent-trading/news/newswire_sources.json
  - /workspace/agent-trading/runtime/state/newswire_dedupe.json

# 输出文件
output_files:
  - /workspace/agent-trading/artifacts/newswire/latest.json
  - /workspace/agent-trading/artifacts/newswire/history.jsonl
  - /workspace/agent-trading/runtime/state/newswire_dedupe.json

write_scopes:
  - /workspace/agent-trading/artifacts/newswire/
  - /workspace/agent-trading/runtime/state/newswire_dedupe.json

protected_paths:
  - /workspace/agent-trading/docs/
  - /workspace/agent-trading/cron/
  - /workspace/agent-trading/agents/

# 数据源开关（从 sources.json 读取，也可在此覆盖）
default_sources:
  - web_search
  - yahoo_finance
  - market_overview

# 输出格式
# 参见 specs/newswire-output-schema-v1.md

# 汇报目标
report_to: ${ENGINE_MAIN_AGENT_SESSION_KEY}
