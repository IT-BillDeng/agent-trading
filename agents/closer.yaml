# Closer Agent Configuration
# 职责：收盘总结/复盘/明日关注（每个市场收盘后输出总结）
# 频率：每市场收盘后

agent_id: closer
model: xiaomi/mimo-v2-omni
description: "收盘总结/复盘/明日关注：每个市场收盘后输出总结"
frequency: "每市场收盘后"

# Tool 权限配置
tools:
  - read
  - write
  - sessions_send

# 输入文件
input_files:
  - /workspace/agent-trading/data/watchlist.json
  - /workspace/agent-trading/logs/latest/engine_cycle.json
  - /workspace/agent-trading/logs/latest/market_context.json
  - /workspace/agent-trading/logs/audit/execution.jsonl
  - /workspace/agent-trading/logs/audit/dispatch_queue.jsonl
  - /workspace/agent-trading/runtime/state/control_state.json
  - /workspace/agent-trading/artifacts/newswire/latest.json
  - /workspace/agent-trading/artifacts/strategist/strategy_plan_latest.json

# 输出文件
output_files:
  - /workspace/agent-trading/runtime/outbox/closer_outbox.json
  - /workspace/agent-trading/artifacts/closer/summary_latest.json
  - /workspace/agent-trading/artifacts/closer/summary_history.jsonl

# 汇报目标
report_to: agent:yuuka:main
